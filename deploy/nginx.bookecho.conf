# BookEcho 宿主机 / 网关 Nginx 反向代理
# --------------------------------------------------
# 适用场景：
#   Docker Compose 已在本机暴露：
#     - web: http://127.0.0.1:25698  （前端 SPA + 容器内 /api 反代）
#     - api: http://127.0.0.1:56418  （后端直连，一般无需对外）
#
# 推荐只反代到 web（25698），由容器内 nginx 统一转发 /api。
#
# 安装示例（Debian/Ubuntu）：
#   sudo cp deploy/nginx.bookecho.conf /etc/nginx/sites-available/bookecho
#   sudo ln -sf /etc/nginx/sites-available/bookecho /etc/nginx/sites-enabled/bookecho
#   # 按需修改 server_name 与上游地址后：
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS 示例（certbot）：
#   sudo certbot --nginx -d bookecho.example.com
# --------------------------------------------------

upstream bookecho_web {
    # Compose 映射的 web 端口（docker-compose.yml: "25698:80"）
    server 127.0.0.1:25698;
    keepalive 16;
}

# 可选：仅在需要绕过 web、直连 API 时启用（调试用）
# upstream bookecho_api {
#     server 127.0.0.1:56418;
#     keepalive 8;
# }

server {
    listen 80;
    listen [::]:80;
    # 改成你的域名或内网主机名；仅 IP 访问可保持 _
    server_name bookecho.example.com;

    # 小说上传体积（与前端容器 / 业务约定对齐）
    client_max_body_size 50m;

    # 真实 IP（若本机前还有 CDN / 另一层反代，按实际调整）
    # set_real_ip_from 10.0.0.0/8;
    # real_ip_header X-Forwarded-For;
    # real_ip_recursive on;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 健康检查：经 web 反代到后端 /health（web 容器已配置同名 location 时可用）
    # 若 web 未暴露 /health，可改为直连 API：proxy_pass http://127.0.0.1:56418/health;
    location = /health {
        proxy_pass http://bookecho_web/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # API 与 SPA 统一入口：全部转到 web 容器
    location / {
        proxy_pass http://bookecho_web;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # TTS 合成 / 大文件上传可能较慢
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 音频流与上传不适合强缓冲
        proxy_buffering off;
        proxy_request_buffering off;
    }
}

