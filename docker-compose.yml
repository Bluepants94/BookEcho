services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookecho-api
    ports:
      - "56418:8000"
    environment:
      # 任务约定变量名 JWT_SECRET；同步注入 SECRET_KEY 以匹配 backend Settings.secret_key
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY: ${JWT_SECRET}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/bookecho.db}
      DATA_DIR: ${DATA_DIR:-/data}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80}
    volumes:
      - bookecho_data:/data
    networks:
      - bookecho
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookecho-web
    ports:
      - "25698:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - bookecho
    restart: unless-stopped

networks:
  bookecho:
    driver: bridge

volumes:
  bookecho_data: